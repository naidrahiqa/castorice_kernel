name: "🚀 Build Kernel Rescue Tool"

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release Tag (e.g., v0.4.0)"
        required: true
        default: "v0.4.0"

permissions:
  contents: write

jobs:
  build-win:
    name: "💻 Build Windows EXE"
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/rescue_tool/go.sum

      - name: Build Windows Executable
        shell: pwsh
        run: |
          cd tools/rescue_tool
          go build -ldflags="-H=windowsgui" -o KernelRescueTool.exe main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KernelRescueTool-Windows
          path: tools/rescue_tool/KernelRescueTool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          name: "Kernel Rescue Tool ${{ inputs.tag_name }}"
          body: |
            ## 🚀 Kernel Rescue Tool ${{ inputs.tag_name }}
            
            Desktop recovery companion for Android 15 GKI 6.6 kernels.
            
            ### 🛠️ Key Features:
            - **Auto-detection:** Dynamically detects ADB/Fastboot connectivity.
            - **Stock Boot Flasher:** Automates flashing stock `boot.img` for bootlooping devices.
            - **Visual PStore Log Parser:** Directly analyzes `/sys/fs/pstore/console-ramoops-0` and outputs human-readable debugging guidance.
            - **Live Streaming Logs:** Real-time Logcat and Dmesg stream with colorized levels.
            - **Universal:** Compatible with all Android devices.
          files: tools/rescue_tool/KernelRescueTool.exe
          draft: false
          prerelease: false
